name: dart_monty_core
description: Sandboxed Python scripting for Dart. Low-level binding for pydantic/monty's interpreter.
version: 0.0.17
homepage: https://github.com/runyaga/dart_monty_core
repository: https://github.com/runyaga/dart_monty_core

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.0.0
  collection: ^1.18.0
  ffi: ^2.1.3
  hooks: ^1.0.2
  meta: ^1.11.0

dev_dependencies:
  ffigen: ^20.1.1
  file: ^7.0.1
  test: ^1.25.0
  very_good_analysis: ^10.0.0

# Flutter consumers reference these via `- package: dart_monty_core`
# under their own `flutter.assets`. Non-Flutter tooling ignores this
# stanza — no Flutter SDK dependency is introduced.
flutter:
  assets:
    # Must live under lib/ so Flutter consumers can reference them via
    # `packages/dart_monty_core/assets/...` — the packages/<name>/ URI
    # scheme resolves against the package's `lib/` root. Files at the
    # repo root are invisible to cross-package asset resolution.
    - lib/assets/dart_monty_core_bridge.js
    - lib/assets/dart_monty_core_worker.js
    - lib/assets/dart_monty_core_native.wasm

