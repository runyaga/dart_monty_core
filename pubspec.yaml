name: dart_monty_core
description: Thin Dart binding for pydantic/monty — no plugins, no bridge, no registry.
version: 0.0.1
homepage: https://github.com/runyaga/dart_monty_core
repository: https://github.com/runyaga/dart_monty_core

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.0.0
  collection: ^1.18.0
  ffi: ^2.1.3
  hooks: ^1.0.2
  meta: ^1.11.0

dev_dependencies:
  ffigen: ^20.1.1
  file: ^7.0.1
  test: ^1.25.0
  very_good_analysis: ^10.0.0

# Flutter consumers reference these via `- package: dart_monty_core`
# under their own `flutter.assets`. Non-Flutter tooling ignores this
# stanza — no Flutter SDK dependency is introduced.
flutter:
  assets:
    - assets/dart_monty_core_bridge.js
    - assets/dart_monty_core_worker.js
    - assets/dart_monty_core_native.wasm

