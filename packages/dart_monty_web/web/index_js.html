<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monty Interactive REPL (dart2js)</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 0; 
      background: #1e1e1e; 
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: #333;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #444;
    }
    h1 { margin: 0; font-size: 1.2rem; color: #4ec9b0; }
    .badge { 
      background: #007acc; 
      color: white; 
      padding: 2px 8px; 
      border-radius: 4px; 
      font-size: 0.8rem;
      font-weight: bold;
    }
    #output {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.4;
    }
    .line { margin-bottom: 4px; }
    .input-line { color: #9cdcfe; }
    .output-line { color: #dcdcaa; }
    .error-line { color: #f44747; }
    .print-line { color: #b5cea8; }
    .system-line { color: #6a9955; font-style: italic; }
    
    footer {
      background: #252526;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #333;
    }
    input {
      flex: 1;
      background: #3c3c3c;
      border: 1px solid #555;
      color: #ccc;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #007acc;
    }
    button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #1177bb; }
    button:disabled { background: #444; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Monty Python REPL</h1>
    <span class="badge">dart2js</span>
  </header>
  
  <div id="output">
    <div class="system-line">Initializing Monty engine...</div>
  </div>

  <footer>
    <input type="text" id="input" placeholder="Enter Python code here (e.g. 1 + 1)" autofocus disabled>
    <button id="run" disabled>Run</button>
  </footer>

  <!-- Bridge must load before the Dart runner -->
  <script src="dart_monty_bridge.js"></script>
  <script src="repl_demo.dart.js" defer></script>
</body>
</html>
