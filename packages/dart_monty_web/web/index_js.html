<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monty Interactive REPL (dart2js)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 0;
      background: #1e1e1e; color: #d4d4d4;
      display: flex; flex-direction: column; height: 100vh;
    }
    header {
      background: #333; padding: 10px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #444; flex-shrink: 0;
    }
    h1 { margin: 0; font-size: 1.1rem; color: #4ec9b0; }
    .badge {
      background: #007acc; color: white;
      padding: 2px 8px; border-radius: 4px;
      font-size: 0.75rem; font-weight: bold;
    }

    /* Three-column layout */
    .panels {
      display: flex; flex: 1; overflow: hidden; gap: 1px;
      background: #444;
    }
    .panel {
      display: flex; flex-direction: column; flex: 1;
      background: #1e1e1e; overflow: hidden;
    }
    .panel-header {
      background: #2d2d2d; padding: 6px 12px;
      font-size: 0.75rem; font-weight: bold;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #444; flex-shrink: 0;
    }
    .panel-header span { color: #4ec9b0; }
    .panel-header .hint { color: #888; font-weight: normal; font-size: 0.7rem; }

    .output {
      flex: 1; padding: 12px; overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      white-space: pre-wrap; font-size: 13px; line-height: 1.5;
    }
    .input-row {
      background: #252526; padding: 8px; border-top: 1px solid #333;
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .input-row input, .input-row textarea {
      flex: 1; background: #3c3c3c; border: 1px solid #555; color: #ccc;
      padding: 6px 10px; border-radius: 4px;
      font-family: 'Consolas', 'Courier New', monospace; font-size: 13px;
    }
    .input-row input:focus, .input-row textarea:focus { outline: none; border-color: #007acc; }
    .input-row textarea { resize: vertical; min-height: 32px; max-height: 160px; line-height: 1.4; }
    .btn {
      background: #0e639c; color: white; border: none;
      padding: 6px 14px; border-radius: 4px; cursor: pointer;
      font-size: 12px; font-weight: bold; white-space: nowrap;
    }
    .btn:hover { background: #1177bb; }
    .btn:disabled { background: #444; cursor: not-allowed; }
    .btn-sm {
      background: #3c3c3c; color: #ccc; border: 1px solid #555;
      padding: 4px 8px; border-radius: 4px; cursor: pointer;
      font-size: 11px;
    }
    .btn-sm:hover { background: #4a4a4a; }

.input-line  { color: #9cdcfe; }
    .output-line { color: #dcdcaa; }
    .error-line  { color: #f44747; }
    .print-line  { color: #b5cea8; }
    .system-line { color: #6a9955; font-style: italic; }

    /* Examples palette */
    #examples-strip {
      background: #252526; border-bottom: 2px solid #333;
      padding: 10px 12px; display: none; gap: 10px;
      overflow-x: auto; flex-shrink: 0; align-items: stretch;
    }
    .sample-card {
      background: #1a1a1a; border: 1px solid #3c3c3c; border-radius: 6px;
      padding: 10px 12px; min-width: 230px; max-width: 260px;
      flex-shrink: 0; display: flex; flex-direction: column; gap: 5px;
    }
    .sample-num  { color: #6a9955; font-size: 0.66rem; font-weight: bold; text-transform: uppercase; }
    .sample-title{ color: #4ec9b0; font-size: 0.82rem; font-weight: bold; }
    .sample-desc { color: #999; font-size: 0.72rem; line-height: 1.45; flex: 1; }
    .sample-code {
      background: #111; border-radius: 3px; padding: 5px 7px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px; color: #9cdcfe; white-space: pre; overflow-x: auto;
    }
    .sample-actions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
    .inject-btn {
      background: #0e639c; color: white; border: none;
      padding: 3px 8px; border-radius: 3px; cursor: pointer;
      font-size: 10px; font-weight: bold; white-space: nowrap;
    }
    .inject-btn:hover { background: #1177bb; }
    .inject-btn.ext { background: #7a3f9c; }
    .inject-btn.ext:hover { background: #8a4fac; }
    .inject-btn.vfs { background: #3a7a3a; }
    .inject-btn.vfs:hover { background: #4a8a4a; }
  </style>
</head>
<body>
  <header>
    <h1>Monty Python REPL — concurrent sessions · snapshot · VFS</h1>
    <button id="examples-toggle" class="btn-sm">📖 Examples</button>
    <span class="badge">dart2js</span>
  </header>

  <div id="examples-strip"></div>

  <div class="panels">
    <!-- Session A — MontyRepl, independent Rust heap handle -->
    <div class="panel">
      <div class="panel-header">
        <span>Session A</span>
        <span class="hint">MontyRepl · independent state</span>
      </div>
      <div class="output" id="output-a">
        <div class="system-line">Initializing…</div>
      </div>
      <div class="input-row">
        <textarea id="input-a" disabled placeholder="Python code… (Shift+Enter for newline, Enter to run)" rows="2"></textarea>
        <button id="run-a" class="btn" disabled>Run</button>
      </div>
    </div>

    <!-- Externals — MontyRepl calling back into Dart -->
    <div class="panel">
      <div class="panel-header">
        <span>Externals</span>
        <span class="hint">MontyRepl · Dart callbacks · MontyPending</span>
      </div>
      <div class="output" id="output-b">
        <div class="system-line">Initializing…</div>
      </div>
      <div class="input-row">
        <input id="input-b" disabled
          placeholder="result = db_query('users')">
        <button id="run-b" class="btn" disabled>Run</button>
      </div>
    </div>

    <!-- VFS panel — MontyRepl with osHandler per feed() call -->
    <div class="panel">
      <div class="panel-header">
        <span>VFS / OsCall</span>
        <span class="hint">MontyRepl · osHandler · pathlib</span>
      </div>
      <div class="output" id="output-vfs">
        <div class="system-line">Initializing…</div>
      </div>
      <div class="input-row">
        <input id="input-vfs" disabled
          placeholder="import pathlib; pathlib.Path('/data/hello.txt').read_text()">
        <button id="run-vfs" class="btn" disabled>Run</button>
        <button id="snap-vfs" class="btn-sm">📸</button>
        <button id="restore-vfs" class="btn-sm">↩</button>
      </div>
    </div>
  </div>

  <!-- Bridge must load before the Dart runner -->
  <script src="dart_monty_core_bridge.js"></script>
  <script src="repl_demo.dart.js" defer></script>
</body>
</html>
