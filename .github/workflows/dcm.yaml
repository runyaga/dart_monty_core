name: DCM

on:
  push:
    branches: [main]
    paths:
      - 'lib/**/*.dart'
      - 'test/**/*.dart'
      - 'dcm_options.yaml'
      - 'analysis_options.yaml'
  pull_request:
    branches: [main, 'feat/**']
    paths:
      - 'lib/**/*.dart'
      - 'test/**/*.dart'
      - 'dcm_options.yaml'
      - 'analysis_options.yaml'
  workflow_dispatch:

concurrency:
  group: dcm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dcm:
    name: DCM Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - uses: CQLabs/setup-dcm@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: DCM analyze (blocking)
        run: >-
          dcm analyze lib
          --ci-key=${{ secrets.DCM_CI_KEY }}
          --email=${{ secrets.DCM_EMAIL }}

      - name: DCM metrics (blocking)
        if: always()
        continue-on-error: true
        run: >-
          dcm calculate-metrics lib
          --fatal-level=high
          --exclude="{lib/src/ffi/**,lib/src/wasm/**}"
          --ci-key=${{ secrets.DCM_CI_KEY }}
          --email=${{ secrets.DCM_EMAIL }}

      - name: DCM check-unused-code (advisory)
        if: always()
        continue-on-error: true
        run: >-
          dcm check-unused-code lib
          --ci-key=${{ secrets.DCM_CI_KEY }}
          --email=${{ secrets.DCM_EMAIL }}

      - name: DCM check-parameters (advisory)
        if: always()
        continue-on-error: true
        run: >-
          dcm check-parameters lib
          --ci-key=${{ secrets.DCM_CI_KEY }}
          --email=${{ secrets.DCM_EMAIL }}

      - name: Upload to DCM dashboard
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        run: >-
          dcm run lib
          --all
          --upload
          --project=${{ secrets.DCM_PROJECT_KEY }}
          --ci-key=${{ secrets.DCM_CI_KEY }}
          --email=${{ secrets.DCM_EMAIL }}
