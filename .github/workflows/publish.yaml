name: Publish to pub.dev

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']

jobs:
  publish:
    name: Build assets & publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for pub.dev

    steps:
      - uses: actions/checkout@v4

      # Assets are committed to git (Mode A). No rebuild or force-stage
      # step is needed — dart pub publish picks up whatever is in the
      # working tree. Release authors are responsible for committing
      # fresh assets via `bash tool/prebuild.sh` before tagging.
      # (Reproducible cross-host WASM builds are tracked separately;
      # until that's solved, drift-check is deferred.)

      # ── Dart: analyze + publish ──────────────────────────────────────────
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos lib/

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish
        run: dart pub publish --force
