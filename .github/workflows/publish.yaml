name: Publish to pub.dev

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']

jobs:
  publish:
    name: Build assets & publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for pub.dev

    steps:
      - uses: actions/checkout@v4

      # ── Verify committed assets are fresh ─────────────────────────────────
      # Assets are committed to git (Mode A). Rebuild from source and assert
      # the result matches what's committed — refuse to publish stale assets.
      - name: Install Rust stable + wasm32-wasip1
        run: rustup target add wasm32-wasip1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Rebuild assets
        run: bash tool/prebuild.sh

      - name: Fail if committed assets are stale
        run: |
          if ! git diff --exit-code assets/; then
            echo "::error::Committed assets/ are stale relative to source."
            echo "Run locally: bash tool/prebuild.sh && git add assets/ && commit"
            echo "then re-tag."
            exit 1
          fi

      # ── Dart: analyze + publish ──────────────────────────────────────────
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos lib/

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish
        run: dart pub publish --force
