name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # ── Web REPL — uses committed assets (Mode A) ───────────────────────────
      # Assets live in assets/ and are committed to git. No cargo build or
      # node build.js step needed. CI's drift-check job guarantees the
      # committed assets match the Rust source on every PR.
      #
      # npm install is only needed for @pydantic/monty-wasm32-wasi — a
      # runtime dep (WASI worker shim) that isn't produced by our build.
      # --force: package declares cpu:wasm32; npm refuses on x64 Linux
      # otherwise. The package is a WASM binary — the check is a false
      # positive.
      - name: Install WASI runtime dep
        working-directory: js
        run: npm install --force

      - name: Prepare web REPL assets
        run: |
          WEB=packages/dart_monty_web/web
          dart pub get
          cd packages/dart_monty_web && dart pub get && cd ../..
          cp lib/assets/dart_monty_core_bridge.js   $WEB/
          cp lib/assets/dart_monty_core_worker.js   $WEB/
          cp lib/assets/dart_monty_core_native.wasm $WEB/
          mkdir -p $WEB/@pydantic/monty-wasm32-wasi
          cp js/node_modules/@pydantic/monty-wasm32-wasi/wasi-worker-browser.mjs \
             $WEB/@pydantic/monty-wasm32-wasi/

      # ── Web REPL (dart2js) ───────────────────────────────────────────────────
      - name: Build web REPL (dart2js)
        run: |
          dart compile js packages/dart_monty_web/web/repl_demo.dart \
            -o packages/dart_monty_web/web/repl_demo.dart.js --no-source-maps

      # ── Web REPL (dart2wasm) ─────────────────────────────────────────────────
      - name: Build web REPL (dart2wasm)
        run: |
          dart compile wasm packages/dart_monty_web/web/repl_demo.dart \
            -o packages/dart_monty_web/web/repl_demo.wasm

      # ── Assemble site/ ───────────────────────────────────────────────────────
      # Flutter REPL demo removed: the dart_monty_flutter sidecar was deleted
      # under the Mode A asset refactor. The shim moves to dart_monty as
      # DartMonty.ensureInitialized(). A replacement Flutter demo can live in
      # dart_monty/example/ later if wanted.
      - name: Assemble site
        run: |
          mkdir -p site/repl
          cp -r packages/dart_monty_web/web/. site/repl/
          cp docs/index.html site/index.html

      # ── Deploy ───────────────────────────────────────────────────────────────
      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
