name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, 'feat/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Path filter — skip all downstream jobs when only docs/comments changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'lib/**'
              - 'test/**'
              - 'native/**'
              - 'hook/**'
              - 'tool/**'
              - 'packages/**'
              - 'pubspec.*'
              - 'analysis_options.yaml'
              - 'dart_test.yaml'
              - '.github/**'
              - '!**.md'

  # ---------------------------------------------------------------------------
  # FFI binding generation
  # ---------------------------------------------------------------------------
  ffigen:
    name: Generate FFI bindings
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev
      - name: Generate bindings
        run: bash tool/generate_bindings.sh
      - name: Upload bindings
        uses: actions/upload-artifact@v4
        with:
          name: ffi-bindings
          path: lib/src/ffi/generated/dart_monty_bindings.dart
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Dart: analyze + format + unit tests (JIT) + coverage
  # ---------------------------------------------------------------------------
  test:
    name: Dart test (JIT)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ffigen]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-
      - name: Download FFI bindings
        uses: actions/download-artifact@v4
        with:
          name: ffi-bindings
          path: lib/src/ffi/generated
      - run: dart pub get
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Format check
        # The generated bindings are always pre-formatted by generate_bindings.sh
        # so it is safe to include lib/ without exclusions.
        run: |
          dart format --line-length=80 --set-exit-if-changed \
            lib/ test/ hook/ tool/
      - name: Test (JIT, unit only)
        # Exit 79 = no tests found; acceptable until unit tests exist alongside
        # the integration suite. Coverage will be empty but that is tolerated.
        run: |
          dart test --exclude-tags=ffi,wasm,integration,ladder --coverage=coverage \
          || EXIT=$?; [ "${EXIT:-0}" -eq 79 ] && echo "No unit tests yet (exit 79 OK)" || exit "${EXIT:-0}"
      - name: Generate LCOV
        # Skip if no coverage data was collected (no unit tests yet).
        run: |
          if compgen -G "coverage/*.json" > /dev/null 2>&1; then
            dart pub global activate coverage
            dart pub global run coverage:format_coverage \
              --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
          else
            echo "No coverage data — writing empty lcov tracefile"
            mkdir -p coverage
            touch coverage/lcov.info
          fi
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lcov-dart
          path: coverage/lcov.info
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Dart: unit tests compiled with dart2native (AOT)
  # AOT and JIT can diverge on: number representation, tree-shaking, timing
  # Skipped until the codebase has unit tests separate from integration tests.
  # ---------------------------------------------------------------------------
  test-aot:
    name: Dart test (AOT)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ffigen]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-
      - name: Download FFI bindings
        uses: actions/download-artifact@v4
        with:
          name: ffi-bindings
          path: lib/src/ffi/generated
      - run: dart pub get
      - name: Build native test kernel
        # All current tests are integration tests; exit 79 (no tests found)
        # is acceptable until unit tests are added alongside the integration suite.
        run: |
          dart test --exclude-tags=ffi,wasm,integration,ladder \
            --platform vm \
            --compiler=kernel \
          || EXIT=$?; [ "${EXIT:-0}" -eq 79 ] && echo "No unit tests yet (exit 79 OK)" || exit "${EXIT:-0}"
      - name: Run compiled AOT snapshot (if available)
        run: echo "AOT kernel test completed via dart test --compiler=kernel"

  # ---------------------------------------------------------------------------
  # Rust: fmt + clippy + tests + llvm-cov coverage (≥80% line coverage)
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (fmt + clippy + test + coverage)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: cargo fmt
        working-directory: native
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: native
        run: cargo clippy -- -D warnings
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: cargo deny check
        working-directory: native
        run: cargo deny check
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage (≥60% line coverage)
        working-directory: native
        run: |
          cargo llvm-cov --summary-only --ignore-filename-regex 'src/bin/' 2>&1 | tee cov.txt
          # Extract line coverage from the TOTAL row (10th whitespace-separated field)
          LINE_PCT=$(awk '/^TOTAL/{gsub(/%/,"",$10); print $10}' cov.txt)
          echo "Line coverage: ${LINE_PCT}%"
          WHOLE=${LINE_PCT%%.*}
          if [ "${WHOLE:-0}" -lt 60 ]; then
            echo "FAIL: Rust line coverage ${LINE_PCT}% is below 60% minimum."
            exit 1
          fi
          echo "PASS: Rust line coverage ${LINE_PCT}% >= 60%"

  # ---------------------------------------------------------------------------
  # Build WASM binary (wasm32-wasip1)
  # ---------------------------------------------------------------------------
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: Build WASM
        working-directory: native
        run: cargo build --release --target wasm32-wasip1
      - name: Upload WASM binary
        uses: actions/upload-artifact@v4
        with:
          name: wasm-binary
          path: native/target/wasm32-wasip1/release/dart_monty_core_native.wasm
          retention-days: 1

  # ---------------------------------------------------------------------------
  # FFI integration tests — 464 fixtures, oracle binary vs MontyFfi
  # Runs on VM (JIT). The oracle subprocess itself is a Rust binary.
  # ---------------------------------------------------------------------------
  test-ffi:
    name: FFI integration tests
    needs: [changes, ffigen]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: Download FFI bindings
        uses: actions/download-artifact@v4
        with:
          name: ffi-bindings
          path: lib/src/ffi/generated
      - name: Build native library
        working-directory: native
        run: cargo build --release
      - name: Build oracle binary
        working-directory: native
        run: cargo build --bin oracle
      - run: dart pub get
      - name: Run FFI integration tests
        run: |
          dart test \
            test/integration/oracle_ffi_test.dart \
            test/integration/oracle_ffi_ext_test.dart \
            test/integration/ffi_datetime_oscall_test.dart \
            test/integration/ffi_feedrun_async_matrix_test.dart \
            test/integration/ffi_monty_async_inputs_test.dart \
            test/integration/ffi_multi_repl_test.dart \
            test/integration/ffi_repl_futures_test.dart \
            test/integration/ffi_repl_oscall_test.dart \
            test/integration/ffi_run_async_matrix_test.dart \
            test/integration/repros \
            -p vm --run-skipped --tags=ffi --exclude-tags=pending-futures \
            --reporter=expanded

  # ---------------------------------------------------------------------------
  # Example smoke tests — every example/*.dart must compile and exit 0.
  # `dart analyze` only checks types; this is the only thing exercising the
  # examples at runtime. Broken examples are tracked via markTestSkipped()
  # with a TODO reason; remove the skip-list entry to enforce.
  # ---------------------------------------------------------------------------
  test-examples:
    name: Example smoke tests
    needs: [changes, ffigen]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: Download FFI bindings
        uses: actions/download-artifact@v4
        with:
          name: ffi-bindings
          path: lib/src/ffi/generated
      - name: Build native library
        working-directory: native
        run: cargo build --release
      - run: dart pub get
      - name: Run example smoke tests
        run: |
          dart test test/integration/example_smoke_test.dart \
            -p vm --run-skipped --tags=example --reporter=expanded

      # Compile-only smoke for the Pages demo. Catches API drift between
      # `Monty`/`MontyRepl` refactors and packages/dart_monty_web at PR time
      # rather than after merge (deploy-pages.yml only runs on push:main).
      - name: Build web REPL (compile-only smoke)
        run: |
          cd packages/dart_monty_web && dart pub get && cd ../..
          dart compile js packages/dart_monty_web/web/repl_demo.dart \
            -o /tmp/repl_demo.dart.js --no-source-maps

  # ---------------------------------------------------------------------------
  # WASM/JS integration tests — 464 fixtures through MontyWasm in headless Chrome
  # Uses the dart_monty JS bridge (sparse-checkout) + freshly built WASM binary.
  # ---------------------------------------------------------------------------
  test-wasm:
    name: WASM/JS integration tests
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('js/package.json') }}
          restore-keys: npm-

      # Assets are committed to git (Mode A). Stage them directly for
      # the test runner rather than rebuilding from source — drift-check
      # owns the rebuild-parity story. npm install is still needed for
      # the WASI runtime (@pydantic/monty-wasm32-wasi), which is a pure
      # runtime dep not produced by our build.
      - name: Stage bridge assets for test runner
        run: |
          set -euo pipefail
          WEB_DIR="test/integration/web"

          cd js
          echo "--- npm install (WASI runtime) ---"
          npm install --force
          cd "$GITHUB_WORKSPACE"

          # Verify committed assets exist (they should — drift-check enforces).
          for f in lib/assets/dart_monty_core_bridge.js lib/assets/dart_monty_core_worker.js lib/assets/dart_monty_core_native.wasm; do
            [ -f "$f" ] || { echo "FATAL: committed asset missing: $f (run bash tool/prebuild.sh)"; exit 1; }
          done

          # Stage bridge assets for the test runner.
          mkdir -p "$GITHUB_WORKSPACE/$WEB_DIR"
          cp lib/assets/dart_monty_core_bridge.js "$GITHUB_WORKSPACE/$WEB_DIR/"
          cp lib/assets/dart_monty_core_worker.js "$GITHUB_WORKSPACE/$WEB_DIR/"
          cp lib/assets/dart_monty_core_native.wasm "$GITHUB_WORKSPACE/$WEB_DIR/"

          # WASI runtime required by the Worker.
          WASI_PKG="js/node_modules/@pydantic/monty-wasm32-wasi"
          [ -f "$WASI_PKG/wasi-worker-browser.mjs" ] || { echo "FATAL: $WASI_PKG/wasi-worker-browser.mjs not found"; exit 1; }
          mkdir -p "$GITHUB_WORKSPACE/$WEB_DIR/@pydantic/monty-wasm32-wasi"
          cp "$WASI_PKG/wasi-worker-browser.mjs" \
             "$GITHUB_WORKSPACE/$WEB_DIR/@pydantic/monty-wasm32-wasi/"

          # Final verification — every file the test runner needs must exist.
          for f in \
            "$WEB_DIR/dart_monty_core_bridge.js" \
            "$WEB_DIR/dart_monty_core_worker.js" \
            "$WEB_DIR/dart_monty_core_native.wasm" \
            "$WEB_DIR/@pydantic/monty-wasm32-wasi/wasi-worker-browser.mjs"; do
            [ -f "$GITHUB_WORKSPACE/$f" ] || { echo "FATAL: staged asset missing: $f"; exit 1; }
          done

          echo "=== bridge assets staged ==="
          ls -lh "$GITHUB_WORKSPACE/$WEB_DIR/"

      - run: dart pub get

      - name: Compile WASM runner to JS
        run: |
          dart compile js test/integration/wasm_runner.dart \
            -o test/integration/web/wasm_runner.dart.js \
            --no-minify

      - name: Compile WASM runner to WASM
        run: |
          dart compile wasm test/integration/wasm_runner_wasm.dart \
            -o test/integration/web/wasm_runner.wasm

      - name: Serve and run in headless Chrome
        run: |
          WEB_DIR="test/integration/web"
          SERVE_PORT=8099

          # Python server with COOP/COEP headers required for SharedArrayBuffer
          python3 << 'PYEOF' &
          import http.server, functools, os
          class H(http.server.SimpleHTTPRequestHandler):
              def end_headers(self):
                  self.send_header("Cross-Origin-Opener-Policy", "same-origin")
                  self.send_header("Cross-Origin-Embedder-Policy", "require-corp")
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Cache-Control", "no-store")
                  super().end_headers()
              def guess_type(self, path):
                  if str(path).endswith(".mjs"): return "application/javascript"
                  if str(path).endswith(".wasm"): return "application/wasm"
                  return super().guess_type(path)
              def log_message(self, fmt, *args): pass
          handler = functools.partial(H, directory=os.environ["WEB_DIR"])
          http.server.HTTPServer(("127.0.0.1", 8099), handler).serve_forever()
          PYEOF
          sleep 2

          CHROME="google-chrome-stable"
          TOTAL_FAILURES=0

          run_test() {
            local url=$1
            local label=$2
            local log=$(mktemp)
            echo "--- Running $label test ---"

            # Run Chrome in the background and stream stderr to the log file.
            # Poll the log for FIXTURE_DONE instead of waiting for Chrome to
            # exit — headless Chrome never exits on its own, so without this
            # we burn the full 300s timeout on every run.
            "$CHROME" \
              --headless \
              --disable-gpu \
              --no-sandbox \
              --disable-dev-shm-usage \
              --enable-logging=stderr \
              --v=0 \
              "$url" \
              2>"$log" &
            local chrome_pid=$!

            local elapsed=0
            while [ $elapsed -lt 300 ]; do
              if grep -q 'FIXTURE_DONE:' "$log" 2>/dev/null; then
                break
              fi
              sleep 1
              elapsed=$((elapsed + 1))
            done
            kill "$chrome_pid" 2>/dev/null || true
            wait "$chrome_pid" 2>/dev/null || true

            DONE_LINE=$(grep -o 'FIXTURE_DONE:{[^}]*}' "$log" || true)
            if [ -z "$DONE_LINE" ]; then
              echo "ERROR ($label): No FIXTURE_DONE line captured after ${elapsed}s. Chrome output:"
              grep -i "CONSOLE\|FIXTURE\|ERROR" "$log" | head -60 || true
              rm -f "$log"
              TOTAL_FAILURES=$((TOTAL_FAILURES + 1))
              return
            fi

            echo "$label: $DONE_LINE (${elapsed}s)"
            FAILURES=$(grep -o 'FIXTURE_RESULT:{[^}]*}' "$log" | grep '"ok":false' | wc -l || echo 0)
            if [ "$FAILURES" -gt 0 ]; then
              echo "ERROR ($label): $FAILURES fixtures failed"
              echo "  --- failed fixtures ---"
              grep -o 'FIXTURE_RESULT:{[^}]*}' "$log" | grep '"ok":false' | while IFS= read -r line; do
                echo "    ${line#*FIXTURE_RESULT:}"
              done
              TOTAL_FAILURES=$((TOTAL_FAILURES + FAILURES))
            fi
            rm -f "$log"
          }

          run_test "http://127.0.0.1:$SERVE_PORT/wasm_runner.html" "dart2js"
          run_test "http://127.0.0.1:$SERVE_PORT/wasm_runner_wasm.html" "dart2wasm"

          if [ "$TOTAL_FAILURES" -gt 0 ]; then
            echo "WASM integration tests: $TOTAL_FAILURES TOTAL FAILURES"
            exit 1
          fi
          echo "WASM integration tests: ALL PASSED"
        env:
          WEB_DIR: test/integration/web


  # ---------------------------------------------------------------------------
  # WASM unit-style tests — package:test scenarios under test/integration/wasm_*_test.dart
  # (datetime_oscall, multi_repl, setextfns, fixture). Distinct from the
  # fixture-corpus runner above, which uses a standalone Dart program.
  # ---------------------------------------------------------------------------
  test-wasm-unit:
    name: WASM unit-style tests
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('js/package.json') }}
          restore-keys: npm-

      - run: dart pub get

      - name: Install WASI runtime (npm)
        run: |
          set -euo pipefail
          cd js
          npm install --force

      - name: Run WASM unit-style tests
        run: bash tool/test_wasm_unit.sh

  # ---------------------------------------------------------------------------
  # Patch coverage gate — PRs must maintain >= 70% coverage on changed lines
  # ---------------------------------------------------------------------------
  patch-coverage:
    name: Patch coverage gate (70%)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install diff-cover
        run: pip install diff-cover
      - name: Download lcov artifact
        uses: actions/download-artifact@v4
        with:
          name: lcov-dart
          path: coverage
      - name: Check patch coverage
        run: |
          sudo apt-get update && sudo apt-get install -y lcov
          # Skip gate when tracefile is empty (no unit tests yet).
          if [ ! -s coverage/lcov.info ]; then
            echo "Coverage tracefile is empty — skipping patch coverage gate until unit tests exist."
            exit 0
          fi
          lcov --remove coverage/lcov.info \
            '*/ffi/generated/*' \
            '*/native_bindings_ffi.dart' \
            '*/native_isolate_bindings_impl.dart' \
            -o filtered-coverage.info
          diff-cover filtered-coverage.info \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=70 \
            --diff-range-notation='..'
